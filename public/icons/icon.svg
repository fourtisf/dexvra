<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Dexvra">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4BFCA6"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#12B9E0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04240F"/>
      <stop offset="1" stop-color="#02160A"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#badge)"/>
  <!-- top gloss highlight -->
  <rect x="0" y="0" width="512" height="512" rx="118" fill="url(#gloss)"/>
  <!-- inner bottom shade for depth -->
  <rect x="0" y="0" width="512" height="512" rx="118" fill="none" stroke="rgba(3,60,35,0.28)" stroke-width="2"/>

  <!-- D monogram (even weight, counter cut with evenodd) -->
  <path fill-rule="evenodd" fill="url(#ink)"
        d="M130 116 L242 116 A140 140 0 0 1 242 396 L130 396 Z
           M196 176 L242 176 A80 80 0 0 1 242 336 L196 336 Z"/>
  <!-- subtle top highlight edge on the D -->
  <path fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="3" stroke-linecap="round"
        d="M138 124 L240 124"/>
</svg>
